upstream shadowlink_server {
    server 127.0.0.1:8443;
}

server {
    listen 443 ssl http2;
    server_name _;

    # TLS configuration — use real certs in production
    ssl_certificate /etc/ssl/shadowlink/fullchain.pem;
    ssl_certificate_key /etc/ssl/shadowlink/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Hide server identity
    server_tokens off;
    more_clear_headers Server;

    # WebSocket path — proxied to ShadowLink Go server
    location /ws {
        proxy_pass http://shadowlink_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Everything else serves a decoy website (anti-probe)
    location / {
        root /var/www/decoy;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Block common scanner paths
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 404;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
